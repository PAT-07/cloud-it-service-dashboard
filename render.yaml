services:
  - type: web
    name: cloud-it-service-dashboard
    env: python
    pythonVersion: "3.11.0"
    rootDir: backend/lambda-api
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: JWT_SECRET_KEY
        value: localdevsecretkey123456789abcdef
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
